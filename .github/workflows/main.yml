# Build 8
name: Build AAB

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android & Build
        run: |
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore_b64.txt
          base64 -d keystore_b64.txt > ykstakip.keystore
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ykstakip.keystore \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            android/app/build/outputs/bundle/release/app-release.aab \
            ykstakip
          cp android/app/build/outputs/bundle/release/app-release.aab app-signed.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: YKS-Takip-AAB
          path: app-signed.aab
