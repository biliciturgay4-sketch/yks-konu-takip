name: Build AAB

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android & Build
        run: |
          npx cap add android
          npx cap sync android
          sed -i "s/targetSdkVersion 34/targetSdkVersion 35/g" android/app/build.gradle
          sed -i "s/targetSdk = 34/targetSdk = 35/g" android/app/build.gradle
          sed -i "s/targetSdk 34/targetSdk 35/g" android/app/build.gradle
          sed -i "s/compileSdkVersion 34/compileSdkVersion 35/g" android/app/build.gradle
          sed -i "s/compileSdk = 34/compileSdk = 35/g" android/app/build.gradle
          sed -i "s/compileSdk 34/compileSdk 35/g" android/app/build.gradle
          sed -i "s/targetSdkVersion = 34/targetSdkVersion = 35/g" android/variables.gradle
          sed -i "s/compileSdkVersion = 34/compileSdkVersion = 35/g" android/variables.gradle
          sed -i "s/versionCode 1/versionCode $GITHUB_RUN_NUMBER/g" android/app/build.gradle

      - name: Add App Icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

      - name: Build AAB
        run: |
          cat android/app/build.gradle
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        run: |
          keytool -genkey -v \
            -keystore ykstakip.keystore \
            -alias ykstakip \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=YKS Takip, OU=App, O=YKS, L=Istanbul, S=Istanbul, C=TR" \
            -storepass 123456 \
            -keypass 123456
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ykstakip.keystore \
            -storepass 123456 \
            -keypass 123456 \
            android/app/build/outputs/bundle/release/app-release.aab \
            ykstakip
          cp android/app/build/outputs/bundle/release/app-release.aab app-signed.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: YKS-Takip-AAB
          path: app-signed.aab
