# Build 6
name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android & Build
        run: |
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Create and Sign APK
        run: |
          keytool -genkey -v \
            -keystore ykstakip.keystore \
            -alias ykstakip \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=YKS Takip, OU=App, O=YKS, L=Istanbul, S=Istanbul, C=TR" \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }}
          BUILD_TOOLS=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -1)
          /usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            app-aligned.apk
          /usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ykstakip.keystore \
            --ks-key-alias ykstakip \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out app-release-signed.apk \
            app-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YKS-Takip-Release
          path: app-release-signed.apk
