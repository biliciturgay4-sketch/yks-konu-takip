name: Build AAB

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android & Build
        run: |
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease -PversionCode=$GITHUB_RUN_NUMBER

      - name: Sign AAB
        run: |
          keytool -genkey -v \
            -keystore ykstakip.keystore \
            -alias ykstakip \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=YKS Takip, OU=App, O=YKS, L=Istanbul, S=Istanbul, C=TR" \
            -storepass 123456 \
            -keypass 123456
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ykstakip.keystore \
            -storepass 123456 \
            -keypass 123456 \
            android/app/build/outputs/bundle/release/app-release.aab \
            ykstakip
          cp android/app/build/outputs/bundle/release/app-release.aab app-signed.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: YKS-Takip-AAB
          path: app-signed.aab
